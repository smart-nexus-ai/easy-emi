<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1e40af" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background circle with rich blue gradient -->
  <circle cx="256" cy="256" r="230" fill="url(#blueGrad)" filter="url(#glow)" />
  
  <!-- Outer metallic accent ring -->
  <circle cx="256" cy="256" r="224" stroke="#ffffff" stroke-width="4" stroke-opacity="0.15" fill="none" />

  <!-- Document / Slip Graphics Group -->
  <g transform="translate(136, 120)">
    <!-- Base Paper Slip / Card -->
    <rect x="0" y="0" width="240" height="280" rx="20" fill="url(#cardGrad)" />
    
    <!-- Slip Header Banner -->
    <path d="M 0 20 A 20 20 0 0 1 20 0 L 220 0 A 20 20 0 0 1 240 20 L 240 60 L 0 60 Z" fill="#eff6ff" />
    
    <!-- Mini emblem inside blue banner header -->
    <rect x="24" y="24" width="20" height="12" rx="3" fill="#3b82f6" />
    <circle cx="190" cy="30" r="8" fill="#10b981" />
    
    <!-- Ledger grid lines -->
    <!-- Line 1 -->
    <rect x="24" y="90" width="120" height="10" rx="3" fill="#cbd5e1" />
    <rect x="176" y="90" width="40" height="10" rx="3" fill="#94a3b8" />
    
    <!-- Line 2 -->
    <rect x="24" y="125" width="100" height="10" rx="3" fill="#e2e8f0" />
    <rect x="176" y="125" width="40" height="10" rx="3" fill="#94a3b8" />
    
    <!-- Line 3 -->
    <rect x="24" y="160" width="130" height="10" rx="3" fill="#e2e8f0" />
    <rect x="176" y="160" width="40" height="10" rx="3" fill="#94a3b8" />
    
    <!-- Double dotted total spacer line -->
    <line x1="24" y1="195" x2="216" y2="195" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4" />
    
    <!-- Total Summary Badge (Highlight Box) -->
    <rect x="24" y="215" width="192" height="42" rx="10" fill="#2563eb" />
    <rect x="40" y="231" width="60" height="10" rx="3" fill="#eff6ff" fill-opacity="0.6" />
    <rect x="136" y="228" width="64" height="16" rx="4" fill="#ffffff" />
  </g>
</svg>
